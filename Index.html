    --pink-soft: #d48aaa;
    --pink-pale: #e0a0c0;
    --pink-ghost: rgba(212,160,180,0.12);

    --bg-end: #eddae5;
    --card-bg: rgba(255,255,255,0.55);

  @keyframes twinkle {

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-8px) rotate(3deg); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    60% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { top: -120px; right: -80px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(240,180,200,0.25) 0%, transparent 70%); }
  .blob-2 { bottom: -100px; left: -60px; width: 350px; height: 350px; background: radial-gradient(circle, rgba(220,170,200,0.2) 0%, transparent 70%); }
  .blob-3 { top: 40%; left: 50%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(245,200,215,0.12) 0%, transparent 60%); transform: translate(-50%, -50%); }

  .star {

  }

  /* Navigation */
  .nav {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 36px;
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 14px 0;
    background: linear-gradient(to bottom, rgba(253,240,244,0.95) 0%, rgba(253,240,244,0.8) 80%, transparent 100%);

    -webkit-backdrop-filter: blur(12px);

  .nav-btn {

    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 9px 20px;
    border-radius: 30px;
    border: 1.5px solid rgba(212,140,180,0.2);
    background: rgba(255,255,255,0.5);
    color: var(--text-muted);

  .date-label {

    font-size: 10px;

    margin-bottom: 10px;
    font-weight: 600;

  .greeting {

    font-size: 20px;
    color: var(--text-sub);
    font-weight: 500;
  }

    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 28px 28px;

    border-color: rgba(212,140,180,0.3);

  .habit-check {

    background: rgba(255,255,255,0.4);
    border: 1px solid rgba(212,160,180,0.15);
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 16px;
    animation: fadeUp 0.4s ease both;
  }
  .history-date {
    font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--pink-mid); font-weight: 600; margin-bottom: 14px;

  .history-section {

  .history-section-label {
    font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 2px;

  .history-text {
    font-size: 15px; line-height: 1.6; color: var(--text-body);
  }
  .history-habits {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .history-habit-tag {
    font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 12px;

  .history-habit-tag.done { background: rgba(220,170,200,0.15); color: #a06080; }
  .history-habit-tag.missed { background: rgba(0,0,0,0.03); color: #c0a0b0; text-decoration: line-through; }

  .empty-state {
    text-align: center; padding: 60px 20px;

  /* Footer */

    text-align: center; padding: 16px 0 24px;

  /* Mobile tweaks */
  @media (max-width: 480px) {
    .container { padding: 36px 16px 80px; }
    .card { padding: 22px 20px; }
    .nav-btn { padding: 8px 14px; font-size: 11px; letter-spacing: 1px; }
    .greeting { font-size: 28px; }
    .add-habit-form { flex-wrap: wrap; }
    .add-habit-form .name-input { min-width: 0; }
  }
</style>

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / 864e5);
}

function formatDateFull(dateStr) {
  if (!dateStr) {
    return new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  }
  const [y,m,d] = dateStr.split('-').map(Number);
  return new Date(y, m-1, d).toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

function getGreeting() {
  const h = new Date().getHours();
  return h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
}

// ─── STORAGE ───
function loadToday() {
  try {
    const raw = localStorage.getItem('agenda_' + todayKey());
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveToday(data) {
  try {
    localStorage.setItem('agenda_' + todayKey(), JSON.stringify(data));
  } catch(e) {}
}

function loadHabitConfig() {
  try {
    const raw = localStorage.getItem('agenda_habit_config');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return DEFAULT_HABITS;
}

function saveHabitConfig(habits) {
  try {
    localStorage.setItem('agenda_habit_config', JSON.stringify(habits));
  } catch(e) {}
}

function getAllEntries() {
  const entries = [];
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('agenda_2')) {
        const dateStr = key.replace('agenda_', '');
        const data = JSON.parse(localStorage.getItem(key));
        entries.push({ date: dateStr, ...data });
      }
    }
  } catch(e) {}
  entries.sort((a, b) => b.date.localeCompare(a.date));
  return entries;
}

// ─── STATE ───
let currentView = 'today'; // 'today' | 'history'
let habitConfig = loadHabitConfig();
let todayData = loadToday() || { habits: {}, shadowAnswer: '', journalText: '' };
let showAddHabit = false;

function save() {
  saveToday(todayData);
}

// ─── RENDER ───
function render() {
  const app = document.getElementById('app');
  if (currentView === 'today') renderToday(app);
  else renderHistory(app);
}

function renderToday(app) {
  const dy = dayOfYear();
  const affirmation = AFFIRMATIONS[dy % AFFIRMATIONS.length];
  const fact = FUN_FACTS[dy % FUN_FACTS.length];
  const shadowQ = SHADOW_WORK[dy % SHADOW_WORK.length];
  const completed = habitConfig.filter(h => todayData.habits[h.id]).length;
  const total = habitConfig.length;
  const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

  app.innerHTML = `
    <!-- Nav -->
    <nav class="nav">
      <button class="nav-btn active" onclick="switchView('today')">Today</button>
      <button class="nav-btn" onclick="switchView('history')">Archive</button>
    </nav>

    <!-- Header -->
    <header>
      <div class="crown">👑</div>
      <p class="date-label">${formatDateFull()}</p>
      <h1 class="greeting">${getGreeting()}, gorgeous</h1>
      <p class="subtitle">The world isn't ready for what you're about to do today ✦</p>
    </header>

    <!-- Affirmation -->
    <section class="card card-accent" style="animation-delay:0.1s">
      <span class="card-icon" style="top:10px;right:14px;font-size:28px;animation:float 5s ease-in-out infinite">🦋</span>
      <p class="section-label">Today's Affirmation</p>
      <p class="affirmation-text">"${affirmation}"</p>
    </section>

    <!-- Habit Tracker -->
    <section class="card" style="animation-delay:0.15s">
      <div class="habit-header">
        <div>
          <p class="section-label">Habit Tracker</p>
          <p class="habit-count">${completed} of ${total} slayed</p>
        </div>
        <div class="habit-pct ${pct === 100 ? 'done' : ''}">${pct}%</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill ${pct === 100 ? 'done' : ''}" style="width:${pct}%"></div>
      </div>
      <div id="habit-list"></div>
      <div id="add-habit-area"></div>
      ${pct === 100 ? '<div class="completion-msg">All habits slayed — you ate and left no crumbs 💅✨</div>' : ''}
    </section>

    <!-- Fun Fact -->
    <section class="card" style="animation-delay:0.2s">
      <span class="card-icon" style="bottom:8px;right:14px;font-size:24px;animation:float 6s ease-in-out infinite">🔮</span>
      <p class="section-label">Fun Fact of the Day</p>
      <p class="fact-text">${fact}</p>
    </section>

    <!-- Shadow Work -->
    <section class="card card-shadow" style="animation-delay:0.25s">
      <span class="card-icon" style="top:12px;right:16px;font-size:26px">🌙</span>
      <p class="section-label">Shadow Work</p>
      <p class="prompt-hint">Be real with yourself. This is your safe space, babe.</p>
      <p class="shadow-question">${shadowQ}</p>
      <textarea id="shadow-textarea" rows="5" placeholder="Let it all out...">${todayData.shadowAnswer || ''}</textarea>
    </section>

    <!-- Journal -->
    <section class="card" style="animation-delay:0.3s">
      <span class="card-icon" style="top:12px;right:16px;font-size:24px;animation:float 5s ease-in-out infinite 0.5s">🪷</span>
      <p class="section-label">Personal Thoughts</p>
      <p class="prompt-hint">Unfiltered, unapologetic, just you.</p>
      <textarea id="journal-textarea" rows="7" placeholder="Spill the tea with yourself...">${todayData.journalText || ''}</textarea>
      <div class="word-count" id="word-count"></div>
    </section>

    <footer>She believed she could, so she did. 👑</footer>
  `;

  // Render habits
  const habitList = document.getElementById('habit-list');
  habitConfig.forEach((h, i) => {
    const checked = todayData.habits[h.id];
    const div = document.createElement('div');
    div.className = 'habit-item' + (checked ? ' checked' : '');
    div.style.animationDelay = (i * 0.05) + 's';
    div.innerHTML = `
      <div class="habit-check">${checked ? '✓' : ''}</div>
      <span class="habit-icon">${h.icon}</span>
      <span class="habit-name">${h.name}</span>
      <button class="habit-remove" data-id="${h.id}">×</button>
    `;
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('habit-remove')) return;
      todayData.habits[h.id] = !todayData.habits[h.id];
      save();
      render();
    });
    div.querySelector('.habit-remove').addEventListener('click', (e) => {
      e.stopPropagation();
      habitConfig = habitConfig.filter(x => x.id !== h.id);
      saveHabitConfig(habitConfig);
      save();
      render();
    });
    habitList.appendChild(div);
  });

  // Add habit area
  const addArea = document.getElementById('add-habit-area');
  if (!showAddHabit) {
    addArea.innerHTML = `<button class="add-habit-btn" id="show-add-btn">+ Add a habit, queen</button>`;
    document.getElementById('show-add-btn').addEventListener('click', () => { showAddHabit = true; render(); });
  } else {
    addArea.innerHTML = `
      <div class="add-habit-form">
        <input class="icon-input" id="new-icon" value="💅" maxlength="2">
        <input class="name-input" id="new-name" placeholder="New habit...">
        <button class="btn-add" id="btn-add">Add</button>
        <button class="btn-cancel" id="btn-cancel">×</button>
      </div>
    `;
    document.getElementById('new-name').focus();
    document.getElementById('btn-add').addEventListener('click', addNewHabit);
    document.getElementById('new-name').addEventListener('keydown', (e) => { if (e.key === 'Enter') addNewHabit(); });
    document.getElementById('btn-cancel').addEventListener('click', () => { showAddHabit = false; render(); });
  }

  // Textareas
  const shadowTA = document.getElementById('shadow-textarea');
  const journalTA = document.getElementById('journal-textarea');
  const wcDiv = document.getElementById('word-count');

  function updateWordCount() {
    const words = journalTA.value.trim().split(/\s+/).filter(Boolean).length;
    wcDiv.textContent = words > 0 ? words + ' words ✦' : '';
  }
  updateWordCount();

  shadowTA.addEventListener('input', () => { todayData.shadowAnswer = shadowTA.value; save(); });
  journalTA.addEventListener('input', () => { todayData.journalText = journalTA.value; save(); updateWordCount(); });
}

function addNewHabit() {
  const name = document.getElementById('new-name').value.trim();
  const icon = document.getElementById('new-icon').value || '💅';
  if (!name) return;
  const newH = { id: 'h_' + Date.now(), name, icon };
  habitConfig.push(newH);
  saveHabitConfig(habitConfig);
  showAddHabit = false;
  render();
}

function renderHistory(app) {
  const entries = getAllEntries().filter(e => e.date !== todayKey() || e.shadowAnswer || e.journalText || Object.values(e.habits||{}).some(Boolean));

  app.innerHTML = `
    <nav class="nav">
      <button class="nav-btn" onclick="switchView('today')">Today</button>
      <button class="nav-btn active" onclick="switchView('history')">Archive</button>
    </nav>
    <header>
      <div class="crown">📖</div>
      <h1 class="greeting" style="font-size:clamp(26px,6vw,36px)">Your Archive</h1>
      <p class="subtitle">Look how far you've come ✦</p>
    </header>
    <div id="history-list"></div>
    <footer>Every page of your story matters. 👑</footer>
  `;

  const list = document.getElementById('history-list');
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty-state">No entries yet — today is day one! 🌱</div>';
    return;
  }

  entries.forEach((entry, idx) => {
    const dy = (() => {
      const [y,m,d] = entry.date.split('-').map(Number);
      const dt = new Date(y, m-1, d);
      const start = new Date(y, 0, 0);
      return Math.floor((dt - start) / 864e5);
    })();

    const div = document.createElement('div');
    div.className = 'history-entry';
    div.style.animationDelay = (idx * 0.08) + 's';

    let html = `<p class="history-date">${formatDateFull(entry.date)}</p>`;

    // Affirmation
    html += `<div class="history-section">
      <p class="history-section-label">Affirmation</p>
      <p class="history-text" style="font-style:italic;color:var(--pink-deep)">"${AFFIRMATIONS[dy % AFFIRMATIONS.length]}"</p>
    </div>`;

    // Habits
    const habitEntries = Object.entries(entry.habits || {});
    if (habitEntries.length > 0) {
      html += `<div class="history-section">
        <p class="history-section-label">Habits</p>
        <div class="history-habits">`;
      // Try to match with config names
      habitEntries.forEach(([id, done]) => {
        const cfg = habitConfig.find(h => h.id === id) || DEFAULT_HABITS.find(h => h.id === id);
        const name = cfg ? `${cfg.icon} ${cfg.name}` : id;
        html += `<span class="history-habit-tag ${done ? 'done' : 'missed'}">${name}</span>`;
      });
      html += `</div></div>`;
    }

    // Shadow work
    if (entry.shadowAnswer && entry.shadowAnswer.trim()) {
      html += `<div class="history-section">
        <p class="history-section-label">Shadow Work</p>
        <p class="history-text" style="font-style:italic;margin-bottom:6px;color:var(--pink-deep)">${SHADOW_WORK[dy % SHADOW_WORK.length]}</p>
        <p class="history-text">${entry.shadowAnswer.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</p>
      </div>`;
    }

    // Journal
    if (entry.journalText && entry.journalText.trim()) {
      html += `<div class="history-section">
        <p class="history-section-label">Journal</p>
        <p class="history-text">${entry.journalText.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</p>
      </div>`;
    }

    div.innerHTML = html;
    list.appendChild(div);
  });
}

// ─── NAV ───
window.switchView = function(view) {
  currentView = view;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

// ─── AUTO-SAVE on visibility change ───
document.addEventListener('visibilitychange', () => {
  if (document.hidden) save();
});

// ─── INIT ───
render();
</script>
</body>
</html
