<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink-deep: #5a3050;
    --pink-mid: #c4789a;
    --pink-soft: #d48aaa;
    --pink-pale: #e0a0c0;
    --pink-ghost: rgba(212,160,180,0.12);
    --bg-start: #fef5f8;
    --bg-end: #eddae5;
    --card-bg: rgba(255,255,255,0.55);
    --card-border: rgba(255,255,255,0.7);
    --text-muted: #a0809a;
    --text-sub: #b08a9a;
    --text-body: #6a4560;
    --text-placeholder: #c4a0b0;
    --success: #d48aaa;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: linear-gradient(165deg, var(--bg-start) 0%, #fdf0f4 15%, #fceef5 30%, #f8e8f0 50%, #f5e4ed 65%, #f0dce6 80%, var(--bg-end) 100%);
    font-family: 'Crimson Pro', Georgia, serif;
    color: #4a3545;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.15; transform: scale(0.8); }
    50% { opacity: 0.6; transform: scale(1.2); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-8px) rotate(3deg); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    60% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { top: -120px; right: -80px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(240,180,200,0.25) 0%, transparent 70%); }
  .blob-2 { bottom: -100px; left: -60px; width: 350px; height: 350px; background: radial-gradient(circle, rgba(220,170,200,0.2) 0%, transparent 70%); }
  .blob-3 { top: 40%; left: 50%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(245,200,215,0.12) 0%, transparent 60%); transform: translate(-50%, -50%); }

  .star {
    position: fixed;
    pointer-events: none;
    color: #f0c6d4;
    animation: twinkle 3s ease-in-out infinite;
    z-index: 0;
    font-size: 10px;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 20px 80px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* Navigation */
  .nav {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 36px;
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 14px 0;
    background: linear-gradient(to bottom, rgba(253,240,244,0.95) 0%, rgba(253,240,244,0.8) 80%, transparent 100%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .nav-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 9px 20px;
    border-radius: 30px;
    border: 1.5px solid rgba(212,140,180,0.2);
    background: rgba(255,255,255,0.5);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .nav-btn:hover { border-color: rgba(212,140,180,0.4); color: var(--pink-mid); }
  .nav-btn.active {
    background: linear-gradient(135deg, var(--pink-soft), var(--pink-mid));
    color: #fff;
    border-color: transparent;
    box-shadow: 0 3px 14px rgba(212,138,170,0.3);
  }

  /* Header */
  header { margin-bottom: 40px; text-align: center; }
  .crown { display: inline-block; font-size: 32px; margin-bottom: 14px; animation: float 4s ease-in-out infinite; }
  .date-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--pink-mid);
    margin-bottom: 10px;
    font-weight: 600;
  }
  .greeting {
    font-family: 'Playfair Display', serif;
    font-size: clamp(30px, 7vw, 42px);
    font-weight: 500;
    font-style: italic;
    color: var(--pink-deep);
    line-height: 1.15;
    margin-bottom: 6px;
  }
  .subtitle {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: var(--text-sub);
    font-weight: 500;
  }

  /* Cards */
  .card {
    background: var(--card-bg);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 28px 28px;
    margin-bottom: 24px;
    box-shadow: 0 4px 30px rgba(200,140,160,0.08), 0 1px 3px rgba(0,0,0,0.03);
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
  }
  .card-accent {
    background: linear-gradient(135deg, rgba(255,255,255,0.65) 0%, rgba(250,230,240,0.5) 100%);
    border: 1px solid rgba(230,180,200,0.35);
  }
  .card-shadow {
    background: linear-gradient(145deg, rgba(255,255,255,0.45) 0%, rgba(240,220,235,0.4) 100%);
    border: 1px solid rgba(200,160,185,0.3);
  }

  .card-icon {
    position: absolute;
    opacity: 0.3;
    pointer-events: none;
  }

  .section-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--pink-mid);
    margin-bottom: 10px;
    font-weight: 600;
  }

  /* Affirmation */
  .affirmation-text {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 400;
    font-style: italic;
    line-height: 1.55;
    color: var(--pink-deep);
  }

  /* Habit tracker */
  .habit-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .habit-count { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .habit-pct {
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--pink-mid), var(--pink-pale));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .habit-pct.done { background: linear-gradient(135deg, #d4a0c0, #e8b8d4, #f0c8e0); -webkit-background-clip: text; background-clip: text; }

  .progress-track {
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg, rgba(212,160,180,0.15), rgba(212,160,180,0.1));
    border-radius: 3px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink-soft), var(--pink-pale), var(--pink-soft));
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .progress-fill.done {
    background-size: 200% 100%;
    animation: shimmer 2s linear infinite;
  }

  .habit-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 12px;
    cursor: pointer;
    background: rgba(255,255,255,0.35);
    border: 1.5px solid var(--pink-ghost);
    transition: all 0.3s ease;
    margin-bottom: 6px;
    user-select: none;
    -webkit-user-select: none;
  }
  .habit-item.checked {
    background: rgba(220,170,200,0.12);
    border-color: rgba(212,140,180,0.3);
  }
  .habit-check {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid rgba(200,160,180,0.35);
    background: rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
    font-size: 11px; color: #fff; font-weight: 700;
  }
  .habit-item.checked .habit-check {
    border-color: var(--pink-soft);
    background: linear-gradient(135deg, var(--pink-soft), var(--pink-pale));
  }
  .habit-icon { font-size: 17px; }
  .habit-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--pink-deep);
    flex: 1;
    transition: all 0.3s;
  }
  .habit-item.checked .habit-name {
    color: #b89aaa;
    text-decoration: line-through;
    text-decoration-color: rgba(180,140,160,0.4);
  }
  .habit-remove {
    background: none; border: none; color: #c0a0b0; cursor: pointer;
    font-size: 16px; padding: 2px 6px; opacity: 0.25; transition: opacity 0.2s; line-height: 1;
  }
  .habit-remove:hover { opacity: 0.8; }

  .add-habit-btn {
    margin-top: 10px; padding: 10px 16px; width: 100%;
    background: rgba(255,255,255,0.3);
    border: 1.5px dashed rgba(212,140,180,0.25);
    border-radius: 12px; color: var(--pink-mid); cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    transition: all 0.3s;
  }
  .add-habit-btn:hover { border-color: rgba(212,140,180,0.5); background: rgba(255,255,255,0.5); }

  .add-habit-form {
    margin-top: 10px; display: flex; gap: 8px; align-items: center;
    animation: fadeUp 0.3s ease;
  }
  .add-habit-form input {
    padding: 10px 14px;
    background: rgba(255,255,255,0.5);
    border: 1.5px solid rgba(212,160,180,0.25);
    border-radius: 10px; color: var(--pink-deep); font-size: 14px;
    font-family: 'DM Sans', sans-serif; outline: none;
  }
  .add-habit-form input:focus { border-color: rgba(212,140,170,0.5); box-shadow: 0 0 0 3px rgba(212,140,170,0.1); }
  .add-habit-form .icon-input { width: 44px; text-align: center; font-size: 18px; padding: 10px 6px; }
  .add-habit-form .name-input { flex: 1; }
  .btn-add {
    padding: 10px 18px;
    background: linear-gradient(135deg, var(--pink-soft), var(--pink-mid));
    border: none; border-radius: 10px; color: #fff; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    box-shadow: 0 2px 10px rgba(212,138,170,0.3);
  }
  .btn-cancel {
    padding: 10px 12px; background: rgba(255,255,255,0.4);
    border: 1px solid rgba(212,160,180,0.15); border-radius: 10px;
    color: var(--text-sub); cursor: pointer; font-size: 14px;
  }

  .completion-msg {
    margin-top: 14px; text-align: center; padding: 14px;
    background: linear-gradient(135deg, rgba(240,200,224,0.3), rgba(220,170,200,0.2));
    border-radius: 14px; border: 1px solid rgba(220,170,200,0.25);
    font-family: 'Caveat', cursive; font-size: 19px; color: #a06080;
    animation: popIn 0.5s ease;
  }

  /* Fun fact */
  .fact-text {
    font-size: 16.5px; line-height: 1.65; color: var(--text-body); font-weight: 400;
  }

  /* Shadow work & journal */
  .prompt-hint {
    font-family: 'Caveat', cursive; font-size: 15px; color: var(--text-sub); margin-bottom: 14px;
  }
  .shadow-question {
    font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 400;
    line-height: 1.55; color: var(--pink-deep); font-style: italic; margin-bottom: 18px;
  }

  textarea {
    width: 100%; padding: 16px 18px;
    background: rgba(255,255,255,0.5);
    border: 1.5px solid rgba(212,160,180,0.25);
    border-radius: 14px; color: #4a3545; font-size: 15px;
    font-family: 'Crimson Pro', Georgia, serif; line-height: 1.7;
    resize: vertical; outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  textarea:focus { border-color: rgba(212,140,170,0.5); box-shadow: 0 0 0 3px rgba(212,140,170,0.1); }
  textarea::placeholder { color: var(--text-placeholder); }

  .word-count {
    font-family: 'DM Sans', sans-serif; font-size: 11px; color: #c0a0b0;
    margin-top: 8px; text-align: right;
  }

  /* History / Archive */
  .history-entry {
    background: rgba(255,255,255,0.4);
    border: 1px solid rgba(212,160,180,0.15);
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 16px;
    animation: fadeUp 0.4s ease both;
  }
  .history-date {
    font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--pink-mid); font-weight: 600; margin-bottom: 14px;
  }
  .history-section {
    margin-bottom: 14px;
  }
  .history-section-label {
    font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin-bottom: 6px;
  }
  .history-text {
    font-size: 15px; line-height: 1.6; color: var(--text-body);
  }
  .history-habits {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .history-habit-tag {
    font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 12px;
    border-radius: 20px; font-weight: 500;
  }
  .history-habit-tag.done { background: rgba(220,170,200,0.15); color: #a06080; }
  .history-habit-tag.missed { background: rgba(0,0,0,0.03); color: #c0a0b0; text-decoration: line-through; }

  .empty-state {
    text-align: center; padding: 60px 20px;
    font-family: 'Caveat', cursive; font-size: 20px; color: var(--text-sub);
  }

  /* Footer */
  footer {
    text-align: center; padding: 16px 0 24px;
    font-family: 'Caveat', cursive; font-size: 20px; color: var(--pink-mid); font-weight: 500;
  }

  /* Partner Connect card (her view) */
  .partner-connect-card {
    background: linear-gradient(135deg, rgba(212,138,170,0.15), rgba(180,100,140,0.08));
    border: 1px solid rgba(212,138,170,0.3);
    border-radius: 20px; padding: 20px 20px 16px; margin-bottom: 16px;
    animation: fadeUp 0.4s ease both; animation-delay: 0.35s;
  }
  .partner-connect-card .section-label { margin-bottom: 6px; }
  .partner-connect-hint {
    font-family: 'Caveat', cursive; font-size: 15px; color: var(--text-sub);
    margin-bottom: 14px; line-height: 1.4;
  }
  .code-pill {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--pink-soft); color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 22px; font-weight: 700; letter-spacing: 4px;
    padding: 10px 18px; border-radius: 14px; margin-bottom: 12px;
    user-select: all; cursor: pointer;
  }
  .code-pill-copy { font-size: 14px; letter-spacing: 0; opacity: 0.85; }
  .partner-share-row {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .partner-share-btn {
    flex: 1; min-width: 120px; padding: 10px 14px;
    background: var(--pink-soft); color: #fff;
    border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
  }
  .partner-share-btn:active { opacity: 0.7; }
  .partner-share-btn.secondary {
    background: transparent; border: 1.5px solid var(--pink-soft); color: var(--pink-soft);
  }
  .partner-generate-btn {
    width: 100%; padding: 12px; border: none; border-radius: 14px;
    background: var(--pink-soft); color: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  .partner-generate-btn:active { opacity: 0.7; }

  /* Partner view (his view) */
  .partner-view-wrap {
    min-height: 100vh;
    background: linear-gradient(160deg, #1a0d1e 0%, #2d1533 50%, #1e0e25 100%);
    padding: 0 0 40px;
  }
  .partner-header {
    text-align: center; padding: 48px 24px 24px;
  }
  .partner-crown { font-size: 40px; margin-bottom: 8px; }
  .partner-title {
    font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 600;
    color: #f0c8dc; margin-bottom: 4px;
  }
  .partner-subtitle {
    font-family: 'Caveat', cursive; font-size: 16px; color: rgba(240,200,220,0.6);
  }
  .partner-meta {
    font-family: 'DM Sans', sans-serif; font-size: 12px; color: rgba(240,200,220,0.45);
    margin-top: 8px;
  }
  .partner-cards { padding: 0 16px; display: flex; flex-direction: column; gap: 16px; }
  .partner-card {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(240,180,210,0.15);
    border-radius: 22px; padding: 22px 20px; backdrop-filter: blur(10px);
  }
  .partner-card-label {
    font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: rgba(240,180,210,0.5);
    margin-bottom: 12px;
  }
  .partner-mood-emoji { font-size: 52px; display: block; text-align: center; margin-bottom: 8px; }
  .partner-mood-label {
    font-family: 'Playfair Display', serif; font-size: 22px; color: #f0c8dc;
    text-align: center; margin-bottom: 8px; font-style: italic;
  }
  .partner-mood-tip {
    font-family: 'Caveat', cursive; font-size: 16px; color: rgba(240,200,220,0.75);
    text-align: center; line-height: 1.5;
  }
  .partner-phase-name {

// ─── HELPERS ───
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / 864e5);
}

function formatDateFull(dateStr) {
  if (!dateStr) {

// ─── PERIOD / CYCLE HELPERS ───

function dateStrToDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function dateToStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function daysDiff(a, b) {
  // Returns b - a in whole days
  return Math.round((b - a) / 864e5);
}

// Groups sorted date strings into consecutive runs [{start, end, len}]
function getPeriodRuns(log) {
  if (!log.length) return [];
  const sorted = [...log].sort();
  const runs = [];
  let runStart = sorted[0], runEnd = sorted[0];
  for (let i = 1; i < sorted.length; i++) {
    const prev = dateStrToDate(sorted[i - 1]);
    const cur = dateStrToDate(sorted[i]);
    if (daysDiff(prev, cur) === 1) {
      runEnd = sorted[i];
    } else {
      runs.push({ start: runStart, end: runEnd, len: daysDiff(dateStrToDate(runStart), dateStrToDate(runEnd)) + 1 });
      runStart = sorted[i]; runEnd = sorted[i];
    }
  }
  runs.push({ start: runStart, end: runEnd, len: daysDiff(dateStrToDate(runStart), dateStrToDate(runEnd)) + 1 });
  return runs;
}

function getAvgCycleLength(runs) {
  if (runs.length < 2) return 28;
  let total = 0;
  for (let i = 1; i < runs.length; i++) {
    total += daysDiff(dateStrToDate(runs[i-1].start), dateStrToDate(runs[i].start));
  }
  return Math.round(total / (runs.length - 1));
}

function getAvgPeriodDuration(runs) {
  if (!runs.length) return 5;
  return Math.round(runs.reduce((s, r) => s + r.len, 0) / runs.length);
}

// Returns predicted period start dates as Date objects (up to 4 future windows)
function getPredictedWindows(runs) {
  if (!runs.length) return [];
  const avgCycle = getAvgCycleLength(runs);
  const avgDur = getAvgPeriodDuration(runs);
  const lastStart = dateStrToDate(runs[runs.length - 1].start);
  const today = new Date(); today.setHours(0,0,0,0);
  const windows = [];
  // Go far enough forward to get 4 upcoming windows
  for (let i = 1; i <= 8; i++) {
    const start = addDays(lastStart, avgCycle * i);
    if (windows.length >= 4) break;
    windows.push({ start, end: addDays(start, avgDur - 1), avgDur });
  }
  return windows;
}

// Returns set of predicted YYYY-MM-DD strings
function getPredictedDaySet(runs) {
  const set = new Set();
  const windows = getPredictedWindows(runs);
  windows.forEach(w => {
    for (let i = 0; i < w.avgDur; i++) {
      set.add(dateToStr(addDays(w.start, i)));
    }
  });
  return set;
}

// Returns 'menstrual'|'follicular'|'ovulation'|'luteal'|null for a given date
function getPhaseForDate(dateStr, runs) {
  if (!runs.length) return null;
  const avgCycle = getAvgCycleLength(runs);
  const avgDur = getAvgPeriodDuration(runs);
  const date = dateStrToDate(dateStr);
  const lastStart = dateStrToDate(runs[runs.length - 1].start);
  // Find which cycle number this date is in
  const diff = daysDiff(lastStart, date);
  // Normalise to position within a cycle (could be past or future cycles)
  let pos = diff % avgCycle;
  if (pos < 0) pos += avgCycle;
  const day = pos + 1; // day 1-based within cycle
  if (day <= avgDur) return 'menstrual';
  if (day <= 13) return 'follicular';
  if (day <= 15) return 'ovulation';
  return 'luteal';
}

// Days until next predicted period (negative = currently in period)
function getDaysUntilNext(runs) {
  if (!runs.length) return null;
  const avgCycle = getAvgCycleLength(runs);
  const lastStart = dateStrToDate(runs[runs.length - 1].start);
  const today = new Date(); today.setHours(0,0,0,0);
  const daysSinceLast = daysDiff(lastStart, today);
  const rem = avgCycle - (daysSinceLast % avgCycle);
  return rem === avgCycle ? 0 : rem;
}

// ─── STREAK HELPERS ───
function computeStreak(habitId) {
  const entries = getAllEntries();
  // entries are sorted descending by date; skip today if not yet saved as complete
  let streak = 0;
  let prev = null;
  for (const e of entries) {
    if (!e.habits || Number(e.habits[habitId]) !== 1) break;
    if (prev !== null) {
      // Check consecutive day
      const prevDate = new Date(prev + 'T00:00:00');
      const curDate = new Date(e.date + 'T00:00:00');
      const diff = Math.round((prevDate - curDate) / 864e5);
      if (diff !== 1) break;
    }
    streak++;
    prev = e.date;
  }
  return streak;
}

function getBestStreak(habitId) {
  const entries = getAllEntries(); // descending
  const ascending = [...entries].reverse();
  let best = 0, cur = 0, prev = null;
  for (const e of ascending) {
    if (e.habits && Number(e.habits[habitId]) === 1) {
      if (prev !== null) {
        const prevDate = new Date(prev + 'T00:00:00');
        const curDate = new Date(e.date + 'T00:00:00');
        const diff = Math.round((curDate - prevDate) / 864e5);
        cur = diff === 1 ? cur + 1 : 1;
      } else {
        cur = 1;
      }
      if (cur > best) best = cur;
      prev = e.date;
    } else {
      cur = 0;
      prev = null;
    }
  }
  return best;
}

function buildCalMonth(year, month, logSet, predictedSet, runs, hideLabel) {
  // month is 0-indexed
  const today = todayKey();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  // Convert to Mon-first: 0=Mon...6=Sun
  const startOffset = (firstDay + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const dayLabels = ['M','T','W','T','F','S','S'];

  let gridHTML = '';
  // Empty cells before month start
  for (let i = 0; i < startOffset; i++) {
    gridHTML += `<div class="cal-day cal-empty"></div>`;
  }

  const todayDate = new Date(); todayDate.setHours(0,0,0,0);
  const cellMonth = new Date(year, month, 1);

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isPeriod = logSet.has(ds);
    const isPredicted = !isPeriod && predictedSet.has(ds);
    const isToday = ds === today;
    const cellDate = new Date(year, month, d);
    const isFuture = cellDate > todayDate && !isPredicted;
    const isFutureLock = cellDate > todayDate; // all future days non-tappable
    const phase = runs.length ? getPhaseForDate(ds, runs) : null;

    let cls = 'cal-day';
    if (isPeriod) cls += ' cal-period';
    else if (isPredicted) cls += ' cal-predicted';
    if (isToday) cls += ' cal-today';
    if (isFutureLock) cls += ' cal-future-lock';
    if (phase) cls += ` phase-${phase}`;

    const phDot = phase ? `<div class="cal-phase-dot"></div>` : '';
    const onclick = isFutureLock ? '' : `onclick="togglePeriodDay('${ds}')"`;

    gridHTML += `<div class="${cls}" ${onclick}>
      <span>${d}</span>${phDot}
    </div>`;
  }

  return `
    ${hideLabel ? '' : `<p class="cal-month-label">${monthNames[month]} ${year}</p>`}
    <div class="cal-weekday-row">${dayLabels.map(l => `<div class="cal-weekday">${l}</div>`).join('')}</div>
    <div class="cal-grid">${gridHTML}</div>
  `;
}

function renderStats(app) {
  const entries = getAllEntries();

  // Overview stats
  let bestCompletion = 0, totalPct = 0, countedDays = 0;
  entries.forEach(e => {
    const hIds = Object.keys(e.habits || {});
    if (!hIds.length) return;
    const done = hIds.filter(id => e.habits[id]).length;
    const p = Math.round((done / hIds.length) * 100);
    if (p > bestCompletion) bestCompletion = p;
    totalPct += p;
    countedDays++;
  });
  const avgPct = countedDays > 0 ? Math.round(totalPct / countedDays) : 0;

  // Build week row: last 7 days (Mon→Sun of current week or rolling 7)
  const weekDays = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const labels = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    const label = labels[d.getDay()];
    const entry = entries.find(e => e.date === key);
    let pct = null;
    if (entry) {
      const hIds = Object.keys(entry.habits || {});
      pct = hIds.length ? Math.round((hIds.filter(id => entry.habits[id]).length / hIds.length) * 100) : 0;
    }
    weekDays.push({ key, label, pct, isToday: key === today, isFuture: key > today });
  }

  app.innerHTML = `
    <nav class="nav">
      <button class="nav-btn" onclick="switchView('today')">Today</button>
      <button class="nav-btn" onclick="switchView('history')">Archive</button>

    <!-- Overview -->
    <section class="card card-accent" style="animation-delay:0.1s">
      <p class="section-label">Overview</p>
      <div class="overview-grid">
        <div class="overview-cell">
          <div class="overview-num">${totalDays}</div>
          <div class="overview-label">Days tracked</div>
        </div>
        <div class="overview-cell">
          <div class="overview-num">${avgPct}%</div>
          <div class="overview-label">Avg daily</div>
        </div>
        <div class="overview-cell">
          <div class="overview-num">${bestCompletion}%</div>
          <div class="overview-label">Best day</div>
        </div>
      </div>
    </section>

    <!-- This Week -->
    <section class="card" style="animation-delay:0.15s">
      <p class="section-label">This Week</p>
      <div class="stats-week-row">
        ${weekDays.map(wd => {
          let cls = 'week-dot';
          let inner = wd.label;
          if (wd.isFuture) {
            cls += ' future';
          } else if (wd.pct === null) {
            cls += ' low';
          } else if (wd.pct >= 70) {
            cls += ' high';
            inner = wd.pct + '%';
          } else if (wd.pct >= 30) {

            inner = wd.pct + '%';
          } else {

    firebase.database(_fbApp).ref('agenda/' + code).on('value', snapshot => {
      const data = snapshot.val();
      app.innerHTML = buildPartnerHTML(data, data && data.lastUpdated ? data.lastUpdated : null);
    }, () => {
      app.innerHTML = `<div class="partner-view-wrap"><div class="partner-empty">Couldn't load data.<br>Check the code and your connection.</div></div>`;
    });
  } catch(e) {
    app.innerHTML = `<div class="partner-view-wrap"><div class="partner-empty">Something went wrong. Try refreshing.</div></div>`;
  }
}

// ─── NAV ───
window.switchView = function(view) {
  currentView = view;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

// ─── AUTO-SAVE on visibility change ───
document.addEventListener('visibilitychange', () => {
  if (document.hidden) save();
});

// ─── INIT ───
(function() {
  const urlCode = new URLSearchParams(location.search).get('code');
  if (urlCode) {
    // Partner mode — show his read-only view
    document.title = 'Partner View 💕';
    renderPartner(document.getElementById('app'), urlCode.toUpperCase());
  } else {
    render();
  }
})();

// ─── PWA SERVICE WORKER (inline via Blob URL) ───
// Registers a caching service worker so the app works offline and
// satisfies the PWA installability criteria on Android/Chrome.
// iOS Safari uses the apple-mobile-web-app-capable meta tag instead.
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'her-agenda-v2';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
    });
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      e.respondWith(
        caches.open(CACHE).then(cache =>
          cache.match(e.request).then(cached => {
            const fresh = fetch(e.request).then(r => {
              if (r && r.status === 200) cache.put(e.request, r.clone());
              return r;
            }).catch(() => cached);
            return cached || fresh;
          })
        )
      );
    });
  `;
  try {
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(() => {});
  } catch(e) {}
}
